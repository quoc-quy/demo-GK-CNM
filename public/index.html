<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý Sản phẩm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <h2 class="mb-4 text-primary">Quản lý Sản phẩm</h2>

    <form id="frmProduct" class="row g-2 mb-5 needs-validation" novalidate>
      <input type="hidden" id="id" />

      <div class="col-md-3">
        <input type="text" id="name" class="form-control" placeholder="Tên sản phẩm" required />
        <div class="invalid-feedback">Vui lòng nhập tên sản phẩm!</div>
      </div>

      <div class="col-md-3">
        <input type="number" id="price" class="form-control" placeholder="Giá" min="0" required />
        <div class="invalid-feedback">Giá phải là số ≥ 0!</div>
      </div>

      <div class="col-md-4">
        <input type="file" id="image" class="form-control" accept="image/*" />
      </div>

      <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100">Lưu</button>
      </div>
    </form>

    <div class="row" id="productList"></div>

    <script>
      const API = '/products'
      const frm = document.getElementById('frmProduct')

      // 1. READ: Tải danh sách
      const loadData = async () => {
        const res = await fetch(API)
        const data = await res.json()
        document.getElementById('productList').innerHTML = data
          .map(
            (p) => `
                <div class="col-md-3 mb-4">
                    <div class="card shadow-sm">
                        <img src="${p.image || 'https://via.placeholder.com/200'}" class="card-img-top" style="height:200px; object-fit:cover;">
                        <div class="card-body">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text text-danger fw-bold">${p.price} VNĐ</p>
                            <button onclick="editItem('${p.id}', '${p.name}', '${p.price}')" class="btn btn-warning btn-sm">Sửa</button>
                            <button onclick="deleteItem('${p.id}')" class="btn btn-danger btn-sm">Xóa</button>
                        </div>
                    </div>
                </div>
            `
          )
          .join('')
      }

      // 2. CREATE & UPDATE
      frm.onsubmit = async (e) => {
        e.preventDefault()

        // --- ĐOẠN VALIDATION ---
        if (!frm.checkValidity()) {
          e.stopPropagation()
          frm.classList.add('was-validated') // Hiện viền đỏ/xanh của Bootstrap
          return
        }
        frm.classList.remove('was-validated') // Ẩn viền lỗi nếu dữ liệu hợp lệ
        // -----------------------

        const id = document.getElementById('id').value
        const fd = new FormData()

        fd.append('name', document.getElementById('name').value)
        fd.append('price', document.getElementById('price').value)

        const file = document.getElementById('image').files[0]
        if (file) fd.append('image', file)

        await fetch(id ? `${API}/${id}` : API, {
          method: id ? 'PUT' : 'POST',
          body: fd
        })

        frm.reset()
        document.getElementById('id').value = ''
        loadData()
      }

      // 3. DELETE
      const deleteItem = async (id) => {
        if (confirm('Bạn chắc chắn muốn xóa?')) {
          await fetch(`${API}/${id}`, { method: 'DELETE' })
          loadData()
        }
      }

      // 4. Đưa dữ liệu lên form để Sửa
      const editItem = (id, name, price) => {
        document.getElementById('id').value = id
        document.getElementById('name').value = name
        document.getElementById('price').value = price
        frm.classList.remove('was-validated') // Xóa viền đỏ khi fill data
      }

      // Khởi chạy lúc load trang
      loadData()
    </script>
  </body>
</html>
